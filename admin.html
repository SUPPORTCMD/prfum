<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم العطور</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-panel { max-width: 1300px; margin: 30px auto; padding: 20px; }
    .admin-panel h2 { margin-bottom: 20px; font-size: 24px; }
    .add-product-form {
      background: white; padding: 25px; border-radius: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
      margin-bottom: 30px;
    }
    .add-product-form input, .add-product-form textarea, .add-product-form select {
      padding: 12px 16px; border: 1px solid #ddd; border-radius: 12px; font-size: 15px; width: 100%;
    }
    .add-product-form button {
      grid-column: span 2; padding: 14px; background: #c9a94e; color: white;
      border: none; border-radius: 30px; font-size: 18px; font-weight: 700; cursor: pointer;
    }
    .products-list {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px; margin-top: 20px;
    }
    .product-item {
      background: white; padding: 15px; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex; flex-direction: column; gap: 8px;
    }
    .product-item img { width: 100%; height: 150px; object-fit: cover; border-radius: 12px; }
    .product-item button { padding: 6px 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .edit-btn { background: #f0e0b0; color: #333; }
    .delete-btn { background: #ff6b6b; color: white; }
    #ordersList { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
    .order-card {
      background: white; padding: 20px; border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 15px; align-items: center;
    }
    @media (max-width: 768px) { .order-card { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <div class="logo">عطر<span>ية</span> – Admin</div>
    <div style="display: flex; gap: 15px; align-items: center;">
      <a href="index.html" style="color: #666; text-decoration: none; font-weight: 600;">الرئيسية</a>
      <button id="logoutBtn" style="background: #ff6b6b; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-weight: 600;">تسجيل الخروج</button>
    </div>
  </header>

  <div class="admin-panel">
    <!-- قسم إدارة المنتجات -->
    <h2>📦 إدارة المنتجات</h2>
    <form id="addProductForm" class="add-product-form">
      <input type="text" id="prodName" placeholder="اسم المنتج" required>
      <input type="number" id="prodPrice" placeholder="السعر الأصلي" required>
      <input type="number" id="prodSalePrice" placeholder="سعر الخصم (للقطعة الواحدة)" required>
      <input type="text" id="prodImages" placeholder="روابط الصور (مفصولة بفاصلة)" required>
      <textarea id="prodDesc" placeholder="الوصف" rows="3"></textarea>
      <select id="prodCategory"></select>
      <input type="text" id="quantityDiscounts" placeholder="خصومات الكمية (مثال: 1=449,2=400,3=380)">
      <button type="submit">➕ إضافة منتج</button>
    </form>

    <div class="products-list" id="productsList"></div>

    <hr style="margin: 40px 0;">

    <!-- قسم إدارة الطلبات -->
    <h2>📋 إدارة الطلبات</h2>
    <div id="ordersList"></div>

    <hr style="margin: 40px 0;">

    <!-- قسم إدارة الأقسام -->
    <h2>📂 إدارة الأقسام</h2>
    <form id="addCategoryForm" class="add-product-form" style="grid-template-columns: 1fr 1fr;">
      <input type="text" id="catName" placeholder="اسم القسم" required>
      <input type="text" id="catImage" placeholder="رابط صورة القسم" required>
      <button type="submit" style="grid-column: span 2;">➕ إضافة قسم</button>
    </form>
    <div id="categoriesList" style="display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px;"></div>
  </div>

  <script type="module">
    import { db, ref, set, push, onValue, remove, update } from './config.js';
    import { auth, onAuthStateChanged, signOut } from './config.js';

    // 1. التحقق من تسجيل الدخول
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    });

    // 2. زر تسجيل الخروج (موجود في الهيدر)
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      try {
        await signOut(auth);
        window.location.href = 'login.html';
      } catch (error) {
        console.error("خطأ في تسجيل الخروج:", error);
        alert("حدث خطأ أثناء تسجيل الخروج، حاول مرة أخرى.");
      }
    });

    // ====== الأقسام ======
    const categorySelect = document.getElementById('prodCategory');
    const categoriesListDiv = document.getElementById('categoriesList');

    onValue(ref(db, 'categories'), (snapshot) => {
      const data = snapshot.val();
      categorySelect.innerHTML = '';
      categoriesListDiv.innerHTML = '';
      if (data) {
        Object.keys(data).forEach(key => {
          const cat = data[key];
          const option = document.createElement('option');
          option.value = key;
          option.textContent = cat.name;
          categorySelect.appendChild(option);

          const catDiv = document.createElement('div');
          catDiv.style.cssText = 'background: white; padding: 10px 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 10px;';
          catDiv.innerHTML = `
            <img src="${cat.image || 'images/default-category.jpg'}" style="width:40px;height:40px;object-fit:cover;border-radius:8px;">
            <span>${cat.name}</span>
            <button data-id="${key}" class="delete-cat-btn" style="background:#ff6b6b;color:white;border:none;border-radius:6px;padding:4px 12px;cursor:pointer;">حذف</button>
          `;
          categoriesListDiv.appendChild(catDiv);
        });
        document.querySelectorAll('.delete-cat-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (confirm('هل أنت متأكد من حذف هذا القسم؟')) {
              await remove(ref(db, `categories/${btn.dataset.id}`));
            }
          });
        });
      }
    });

    document.getElementById('addCategoryForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('catName').value;
      const image = document.getElementById('catImage').value;
      if (name && image) {
        try {
          const newCatRef = push(ref(db, 'categories'));
          await set(newCatRef, { name, image });
          document.getElementById('catName').value = '';
          document.getElementById('catImage').value = '';
          alert('✅ تم إضافة القسم بنجاح!');
        } catch (error) {
          console.error(error);
          alert('❌ حدث خطأ في إضافة القسم، تأكد من اتصال Firebase.');
        }
      }
    });

    // ====== المنتجات ======
    const productsListDiv = document.getElementById('productsList');

    function loadProducts() {
      onValue(ref(db, 'products'), (snapshot) => {
        const data = snapshot.val();
        productsListDiv.innerHTML = '';
        if (data) {
          Object.keys(data).forEach(key => {
            const prod = data[key];
            const div = document.createElement('div');
            div.className = 'product-item';
            div.innerHTML = `
              <img src="${prod.images?.[0] || 'images/default.jpg'}" alt="${prod.name}">
              <strong>${prod.name}</strong>
              <span>${prod.salePrice || prod.price} ج.م</span>
              <div style="display:flex; gap:8px;">
                <button class="edit-btn" data-id="${key}">تعديل</button>
                <button class="delete-btn" data-id="${key}">حذف</button>
              </div>
            `;
            productsListDiv.appendChild(div);
          });

          document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (confirm('تأكيد حذف المنتج؟')) {
                await remove(ref(db, `products/${btn.dataset.id}`));
                loadProducts();
              }
            });
          });

          document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', () => {
              const id = btn.dataset.id;
              const prod = data[id];
              document.getElementById('prodName').value = prod.name || '';
              document.getElementById('prodPrice').value = prod.price || '';
              document.getElementById('prodSalePrice').value = prod.salePrice || '';
              document.getElementById('prodImages').value = prod.images?.join(',') || '';
              document.getElementById('prodDesc').value = prod.description || '';
              document.getElementById('prodCategory').value = prod.categoryId || '';
              if (prod.quantityDiscounts) {
                const str = Object.entries(prod.quantityDiscounts).map(([k,v]) => `${k}=${v}`).join(',');
                document.getElementById('quantityDiscounts').value = str;
              }
              const submitBtn = document.querySelector('#addProductForm button[type="submit"]');
              submitBtn.textContent = '🔄 تحديث المنتج';
              submitBtn.dataset.editId = id;
            });
          });
        } else {
          productsListDiv.innerHTML = '<p style="grid-column:1/-1;">لا توجد منتجات</p>';
        }
      });
    }
    loadProducts();

    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('prodName').value;
      const price = parseFloat(document.getElementById('prodPrice').value);
      const salePrice = parseFloat(document.getElementById('prodSalePrice').value);
      const images = document.getElementById('prodImages').value.split(',').map(s => s.trim()).filter(Boolean);
      const description = document.getElementById('prodDesc').value;
      const categoryId = document.getElementById('prodCategory').value;
      const discountStr = document.getElementById('quantityDiscounts').value;
      const quantityDiscounts = {};
      if (discountStr) {
        discountStr.split(',').forEach(pair => {
          const [qty, val] = pair.split('=');
          if (qty && val) quantityDiscounts[parseInt(qty)] = parseFloat(val);
        });
      }

      const productData = { name, price, salePrice, images, description, categoryId, quantityDiscounts };
      const submitBtn = document.querySelector('#addProductForm button[type="submit"]');
      const editId = submitBtn.dataset.editId;

      try {
        if (editId) {
          await update(ref(db, `products/${editId}`), productData);
          submitBtn.textContent = '➕ إضافة منتج';
          delete submitBtn.dataset.editId;
          alert('✅ تم تحديث المنتج');
        } else {
          const newRef = push(ref(db, 'products'));
          await set(newRef, productData);
          alert('✅ تم إضافة المنتج');
        }
        loadProducts();
        document.getElementById('addProductForm').reset();
      } catch (error) {
        console.error(error);
        alert('❌ حدث خطأ، تأكد من بيانات Firebase');
      }
    });

    // ====== الطلبات ======
    const ordersListDiv = document.getElementById('ordersList');

    function loadOrders() {
      onValue(ref(db, 'orders'), (snapshot) => {
        const data = snapshot.val();
        ordersListDiv.innerHTML = '';
        if (data) {
          const sortedKeys = Object.keys(data).sort((a, b) => {
            return new Date(data[b].createdAt) - new Date(data[a].createdAt);
          });

          sortedKeys.forEach(key => {
            const order = data[key];
            const statusColor = { pending: '#f59e0b', shipped: '#10b981' };

            const div = document.createElement('div');
            div.className = 'order-card';
            div.innerHTML = `
              <div>
                <strong>${order.customerName}</strong>
                <div style="font-size: 14px; color: #666;">${order.productName} × ${order.quantity}</div>
                <div style="font-size: 14px; color: #666;">📞 ${order.phone}</div>
                <div style="font-size: 14px; color: #666;">📍 ${order.address}</div>
                ${order.notes ? `<div style="font-size: 14px; color: #888;">📝 ${order.notes}</div>` : ''}
              </div>
              <div style="font-weight: 700;">${order.totalPrice} ج.م</div>
              <div>
                <select data-id="${key}" class="order-status-select" style="padding: 6px 12px; border-radius: 20px; border: 2px solid ${statusColor[order.status] || '#ddd'}; background: ${statusColor[order.status] || '#f8f8f8'}20; font-weight: 600;">
                  <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>⏳ قيد المراجعة</option>
                  <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>🚚 تم الشحن</option>
                </select>
              </div>
              <div style="font-size: 13px; color: #999;">${new Date(order.createdAt).toLocaleString('ar-EG')}</div>
              <button data-id="${key}" class="delete-order-btn" style="background: #ff6b6b; color: white; border: none; border-radius: 8px; padding: 6px 14px; cursor: pointer;">🗑️</button>
            `;
            ordersListDiv.appendChild(div);
          });

          document.querySelectorAll('.order-status-select').forEach(select => {
            select.addEventListener('change', async (e) => {
              const id = e.target.dataset.id;
              const newStatus = e.target.value;
              await update(ref(db, `orders/${id}`), { status: newStatus });
            });
          });

          document.querySelectorAll('.delete-order-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
              if (confirm('تأكيد حذف هذا الطلب؟')) {
                await remove(ref(db, `orders/${btn.dataset.id}`));
                loadOrders();
              }
            });
          });
        } else {
          ordersListDiv.innerHTML = '<p style="text-align:center; color: #999;">لا توجد طلبات حالياً</p>';
        }
      });
    }
    loadOrders();
  </script>
</body>
</html>
