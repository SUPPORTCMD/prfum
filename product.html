<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>براند OVS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="https://i.postimg.cc/htFTpM73/Screenshot-2026-07-23-17-30-01-84-50ef9f5a0f3fc24b6f0ffc8843167fe4.png" alt="شعار عطرية" style="height: 32px; vertical-align: middle; margin-left: 10px;">
      OV<span>S</span>
    </div>
    <a href="admin.html" style="color: #666; text-decoration: none; font-weight: 600;">لوحة التحكم</a>
  </header>

  <div class="product-container" id="productContainer"></div>

  <!-- أيقونات التواصل الاجتماعي -->
  <div style="position: fixed; bottom: 30px; left: 30px; display: flex; gap: 15px; z-index: 999; background: white; padding: 12px 18px; border-radius: 50px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
    <a href="https://www.tiktok.com/@ovs.perfume?_r=1&_t=ZS-98H5ZyqxZp6" target="_blank" style="color: #1a1a1a; font-size: 28px; text-decoration: none; transition: 0.2s;" onmouseover="this.style.color='#c9a94e'" onmouseout="this.style.color='#1a1a1a'">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.11-.59-1.62-.93-.01 2.92.01 5.84-.02 8.76-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z"/></svg>
    </a>
  </div>

  <script type="module">
    import { db, ref, onValue, push, set } from './config.js';

    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');
    const categoryId = params.get('category');
    const container = document.getElementById('productContainer');

    function loadProduct(id) {
      onValue(ref(db, `products/${id}`), (snapshot) => {
        const product = snapshot.val();
        if (!product) {
          container.innerHTML = '<p>المنتج غير موجود</p>';
          return;
        }

        container.innerHTML = `
          <div class="product-gallery">
            <img class="main-img" id="mainImage" src="${product.images?.[0] || 'images/default.jpg'}" alt="${product.name}">
            <div class="thumbnails" id="thumbnails">
              ${product.images?.map(img => `<img src="${img}" alt="صورة" class="${img === product.images[0] ? 'active' : ''}">`).join('') || ''}
            </div>
          </div>
          <div class="product-info">
            <h1>${product.name}</h1>
            <div>
              <span class="price" id="displayPrice">${product.salePrice || product.price}</span>
              <span class="old-price">${product.price}</span>
            </div>
            <p class="description">${product.description || 'لا يوجد وصف'}</p>

            <div class="quantity-selector">
              <button id="decreaseQty">−</button>
              <span id="qtyDisplay">1</span>
              <button id="increaseQty">+</button>
            </div>

            <form class="order-form" id="orderForm">
              <input type="text" placeholder="الاسم الكامل" required name="customerName">
              <input type="text" placeholder="العنوان" required name="address">
              <input type="tel" placeholder="رقم الهاتف" required name="phone">
              <textarea placeholder="ملاحظات إضافية (اختياري)" name="notes" rows="3"></textarea>
              <button type="submit">اطلب الآن</button>
            </form>
          </div>
        `;

        let quantity = 1;
        const qtyDisplay = document.getElementById('qtyDisplay');
        const priceDisplay = document.getElementById('displayPrice');
        const decreaseBtn = document.getElementById('decreaseQty');
        const increaseBtn = document.getElementById('increaseQty');

        const updatePrice = () => {
          const discounts = product.quantityDiscounts || {};
          let price = discounts[quantity] || product.salePrice || product.price;
          priceDisplay.textContent = price;
        };

        decreaseBtn.addEventListener('click', () => {
          if (quantity > 1) {
            quantity--;
            qtyDisplay.textContent = quantity;
            updatePrice();
          }
        });

        increaseBtn.addEventListener('click', () => {
          quantity++;
          qtyDisplay.textContent = quantity;
          updatePrice();
        });

        document.getElementById('thumbnails').addEventListener('click', (e) => {
          if (e.target.tagName === 'IMG') {
            document.getElementById('mainImage').src = e.target.src;
            document.querySelectorAll('.thumbnails img').forEach(img => img.classList.remove('active'));
            e.target.classList.add('active');
          }
        });

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          const formData = new FormData(e.target);

          const order = {
            productId: id,
            productName: product.name,
            quantity,
            totalPrice: parseFloat(priceDisplay.textContent) * quantity,
            customerName: formData.get('customerName'),
            address: formData.get('address'),
            phone: formData.get('phone'),
            notes: formData.get('notes'),
            status: 'pending',
            createdAt: new Date().toISOString()
          };

          try {
            const newOrderRef = push(ref(db, 'orders'));
            await set(newOrderRef, order);
            alert('✅ تم استلام طلبك! رقم الطلب: ' + newOrderRef.key + '\n⏳ طلبك قيد المراجعة، سنتصل بك قريباً.');
            e.target.reset();
            quantity = 1;
            qtyDisplay.textContent = 1;
            updatePrice();
          } catch (error) {
            alert('❌ حدث خطأ، حاول مرة أخرى.');
            console.error(error);
          }
        });

        updatePrice();
      });
    }

    if (productId) {
      loadProduct(productId);
    } else if (categoryId) {
      onValue(ref(db, 'products'), (snapshot) => {
        const data = snapshot.val();
        if (data) {
          const firstProduct = Object.keys(data).find(key => data[key].categoryId === categoryId);
          if (firstProduct) {
            loadProduct(firstProduct);
          } else {
            container.innerHTML = '<p>لا توجد منتجات في هذا القسم</p>';
          }
        } else {
          container.innerHTML = '<p>لا توجد منتجات</p>';
        }
      });
    } else {
      container.innerHTML = '<p>يرجى اختيار منتج من القائمة</p>';
    }
  </script>
</body>
</html>
